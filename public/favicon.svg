<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" color="white">
  <title id="title">Eight-point Soterian crest logo</title>
  <desc id="desc">A circular monogram crest with a stylized S and eight star points around the ring.</desc>

  <defs>
    <style>
      svg { color: #ffffff; }
      .mark {
        fill: none;
        stroke: currentColor;
        stroke-width: 6;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .hair {
        fill: none;
        stroke: currentColor;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .thin {
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .fill {
        fill: currentColor;
      }
    </style>
  </defs>

  <!-- Transparent background. Color is inherited through currentColor. -->

  <!-- Outer crest rings -->
  <circle class="hair" cx="512" cy="512" r="162"/>
  <circle class="thin" cx="512" cy="512" r="154"/>

  <!-- Eight star points around the ring -->
